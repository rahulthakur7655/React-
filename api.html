<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weather UI</title>
  <style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Poppins", sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
}

.app {
  width: 320px;
  padding: 25px;
  border-radius: 25px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(20px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  text-align: center;
  color: white;
  transition: 0.4s;
}

.app:hover {
  transform: translateY(-5px);
}

.search-box {
  display: flex;
  margin-bottom: 20px;
  background: rgba(255,255,255,0.2);
  border-radius: 50px;
  overflow: hidden;
}

#Cityname {
  flex: 1;
  padding: 10px 15px;
  border: none;
  outline: none;
  background: transparent;
  color: white;
}

#Cityname::placeholder {
  color: rgba(255,255,255,0.7);
}

#click {
  padding: 10px 15px;
  border: none;
  background: linear-gradient(45deg, #0072ff, #00c6ff);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

#click:hover {
  background: linear-gradient(45deg, #005bea, #00c6ff);
}

.city {
  font-size: 22px;
  margin-bottom: 10px;
}

.icon {
  font-size: 50px;
  margin: 10px 0;
}

.temp {
  font-size: 60px;
  font-weight: bold;
}

.desc {
  font-size: 18px;
  opacity: 0.9;
}
  </style>
</head>
<body>

  <div class="app">

    <div class="search-box">
      <input type="text" id="Cityname" placeholder="Search city...">
      <button id="click">🔍</button>
    </div>

    <!-- WEATHER CARD -->
    <div class="card">
      <div class="city"></div>
      <div class="icon"></div>
      <div class="temp"></div>
      <div class="desc"></div>
      <div class="time"></div>
    </div>

  </div>

  <script src="api.js"></script>
</body>
</html>
